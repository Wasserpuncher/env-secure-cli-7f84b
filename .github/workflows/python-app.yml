# GitHub Actions Workflow zur Python-Anwendung
# Dieser Workflow installiert Python-Abhängigkeiten, führt Tests aus und lintet den Code.

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Der Job läuft auf dem neuesten Ubuntu-Runner.
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # Checkt das Repository aus.
    - name: Set up Python 3.10 # Richtet Python 3.10 ein.
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies # Installiert alle erforderlichen Python-Abhängigkeiten.
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest click cryptography # Installiert alle Abhängigkeiten, einschließlich click und cryptography.
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8 # Führt Linting mit flake8 durch, um den Code-Stil zu überprüfen.
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-code 0 means no errors / warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    - name: Test with unittest # Führt Unit-Tests aus.
      run: |
        python -m unittest discover
